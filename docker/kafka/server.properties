# ==============================================================================
#  KRaft server.properties — Kafka 3.7 (single-node dev)
# ==============================================================================

# ── Node & Role ───────────────────────────────────────────────────────────────
node.id=1
process.roles=broker,controller
controller.quorum.voters=1@kafka:9093
controller.listener.names=CONTROLLER

# ── Listeners ─────────────────────────────────────────────────────────────────
listeners=INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
advertised.listeners=INTERNAL://kafka:9092,EXTERNAL://localhost:9094
listener.security.protocol.map=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
inter.broker.listener.name=INTERNAL

# ── Topics ────────────────────────────────────────────────────────────────────
auto.create.topics.enable=true
num.partitions=3
default.replication.factor=1

# ── Log ───────────────────────────────────────────────────────────────────────
log.dirs=/tmp/kraft-combined-logs
log.retention.hours=24
log.segment.bytes=104857600

# ── Misc ──────────────────────────────────────────────────────────────────────
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
